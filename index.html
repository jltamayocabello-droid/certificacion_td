<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Práctica para certificación de Talento Digital</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script defer src="assets/js/main.js"></script>
  </head>

  <body class="body">
    <article class="profile-card">
      <header class="profile-card__header">
        <img
          src="https://picsum.photos/150"
          alt="Foto de perfil"
          class="profile-card__avatar"
        />
        <h2 class="profile-card__name">Armando Camus</h2>
        <p class="profile-card__role">Senior Web Developer</p>
      </header>

      <section class="profile-card__body">
        <p class="profile-card__bio">
          Apasionado por el desarrollo Front-End y la arquitectura de
          componentes escalables.
        </p>
      </section>
      <footer class="profile-card__footer">
        <button class="profile-card__button profile-card__button--primary">
          Contactar
        </button>
        <button class="profile-card__button">Portafolio</button>
      </footer>
    </article>
  </body>
</html>
